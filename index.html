<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Traveller - 全球時空軸</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');
        
        /* 移除 iOS 點擊時的預設高亮方塊 */
        * {
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Space+Mono', monospace;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .time-card {
            background: rgba(30, 41, 59, 0.6);
            border: 1px solid rgba(56, 189, 248, 0.2);
            backdrop-filter: blur(8px);
        }

        .timeline-container {
            height: 2px;
            background: rgba(51, 65, 85, 0.5);
            border-radius: 2px;
            position: relative;
        }

        .plane-wrapper {
            position: absolute;
            top: 50%;
            transform: translate(-50%, -50%);
            cursor: grab;
            z-index: 100;
        }
        .plane-wrapper:active {
            cursor: grabbing;
        }

        .plane-icon {
            font-size: 32px;
            /* 移除 text-shadow 以徹底解決 iPhone Safari Emoji 殘影/光亮方框問題 */
            user-select: none;
        }

        .hk-now-marker {
            position: absolute;
            top: -10px;
            width: 2px;
            height: 22px;
            background: #f43f5e;
            box-shadow: 0 0 8px #f43f5e;
            z-index: 10;
        }

        /* 徹底清除 range input 在 iOS Safari/Firefox 上的隱形方框及軌道底色 */
        input[type=range] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            background: transparent !important;
            position: absolute;
            top: 0;
            left: 0;
            height: 60px;
            margin: 0;
            z-index: 110;
            cursor: pointer;
            outline: none !important;
        }

        input[type=range]:focus {
            outline: none !important;
        }

        input[type=range]::-webkit-slider-runnable-track {
            -webkit-appearance: none;
            background: transparent !important;
            border: none !important;
            box-shadow: none !important;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            height: 60px;
            width: 60px;
            background: transparent !important;
            border: none !important;
            box-shadow: none !important;
            -webkit-box-shadow: none !important;
            border-radius: 0;
        }

        input[type=range]::-moz-range-track {
            background: transparent !important;
            border: none !important;
        }

        input[type=range]::-moz-range-thumb {
            height: 60px;
            width: 60px;
            background: transparent !important;
            border: none !important;
            box-shadow: none !important;
        }

        .tab-active {
            background: #0284c7 !important;
            color: white !important;
        }

        .option-btn {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid #334155;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            50% { transform: translateX(4px); }
            75% { transform: translateX(-4px); }
        }
        .animate-shake {
            animation: shake 0.3s ease-in-out;
            border-color: #ef4444 !important;
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.3) !important;
            /* 強制解除灰階與透明度，確保紅框清晰顯示 */
            filter: grayscale(0) !important;
            opacity: 1 !important;
        }

        .expired-btn {
            opacity: 0.3;
            filter: grayscale(1);
        }

        /* 新增：完全鎖死後的專屬樣式，確保文字與 emoji 唔會變灰 */
        .dead-btn {
            background: rgba(15, 23, 42, 0.9) !important;
            border: 1px solid #1e293b !important;
            pointer-events: none;
            /* 無 opacity 同 grayscale，保持入面文字明亮 */
        }

        .status-tag {
            position: absolute;
            top: 2px;
            right: 4px;
            font-size: 8px;
            font-weight: bold;
            opacity: 0.8;
        }
    </style>
</head>
<body class="min-h-screen">

    <div class="max-w-xl w-full px-6">
        <header class="text-center mb-8">
            <h1 class="text-3xl font-bold text-sky-400 mb-2 tracking-tighter text-shadow-sm">TIME TRAVELLER</h1>
            <p class="text-slate-400 text-[10px] uppercase tracking-[0.2em]">Temporal Dislocation Interface</p>
        </header>

        <!-- 顯示面板 -->
        <div class="time-card rounded-3xl p-8 mb-6 text-center shadow-2xl">
            <div id="display-time" class="text-7xl font-bold text-white tracking-tighter">--:--</div>
            <div id="display-date" class="text-sm text-sky-400 mt-2 font-bold uppercase tracking-widest">-- / -- / --</div>
            
            <div class="flex justify-between mt-10 border-t border-slate-700/50 pt-6 px-2">
                <div class="text-left">
                    <p class="text-[10px] text-slate-500 uppercase font-bold mb-1 tracking-widest">Current Offset</p>
                    <div class="flex items-center">
                        <span class="w-2 h-2 bg-sky-500 rounded-full mr-2 animate-pulse"></span>
                        <p id="info-offset" class="text-xl font-bold text-white">UTC +8.0</p>
                    </div>
                </div>
                <div class="text-right">
                    <p class="text-[10px] text-slate-500 uppercase font-bold mb-1 tracking-widest">Destination</p>
                    <p id="info-city" class="text-xl font-bold text-emerald-400">Hong Kong</p>
                </div>
            </div>
        </div>

        <!-- 中間：Tab 選項 -->
        <div class="time-card rounded-2xl p-4 mb-10">
            <div class="flex mb-4 rounded-xl bg-slate-900/50 p-1 border border-slate-700/30">
                <button id="tab-yesterday-btn" onclick="switchTab('yesterday')" class="w-1/2 py-2 text-xs font-bold rounded-lg text-slate-400 transition-all uppercase tracking-wider">Yesterday</button>
                <button id="tab-today-btn" onclick="switchTab('today')" class="w-1/2 py-2 text-xs font-bold rounded-lg tab-active transition-all uppercase tracking-wider">Today</button>
            </div>

            <!-- Yesterday Grid -->
            <div id="options-yesterday" class="grid grid-cols-4 gap-2 hidden">
                <button id="opt-y-morning" onclick="handleOptionClick('yesterday', 'morning', this)" class="option-btn rounded-xl p-2 text-center group">
                    <div class="status-tag"></div>
                    <div class="text-[10px] font-bold text-sky-400 group-hover:scale-110 transition-transform">朝早</div>
                    <div class="text-[8px] text-slate-500">06-12</div>
                </button>
                <button id="opt-y-afternoon" onclick="handleOptionClick('yesterday', 'afternoon', this)" class="option-btn rounded-xl p-2 text-center group">
                    <div class="status-tag"></div>
                    <div class="text-[10px] font-bold text-sky-400 group-hover:scale-110 transition-transform">晏就</div>
                    <div class="text-[8px] text-slate-500">12-18</div>
                </button>
                <button id="opt-y-night" onclick="handleOptionClick('yesterday', 'night', this)" class="option-btn rounded-xl p-2 text-center group">
                    <div class="status-tag"></div>
                    <div class="text-[10px] font-bold text-sky-400 group-hover:scale-110 transition-transform">夜晚</div>
                    <div class="text-[8px] text-slate-500">18-04</div>
                </button>
                <button id="opt-y-deep" onclick="handleOptionClick('yesterday', 'deep_pre', this)" class="option-btn rounded-xl p-2 text-center group">
                    <div class="status-tag"></div>
                    <div class="text-[10px] font-bold text-sky-400 group-hover:scale-110 transition-transform">2400前</div>
                    <div class="text-[8px] text-slate-500">深夜</div>
                </button>
            </div>

            <!-- Today Grid -->
            <div id="options-today" class="grid grid-cols-4 gap-2">
                <button id="opt-t-morning" onclick="handleOptionClick('today', 'morning', this)" class="option-btn rounded-xl p-2 text-center group">
                    <div class="status-tag"></div>
                    <div class="text-[10px] font-bold text-emerald-400 group-hover:scale-110 transition-transform">朝早</div>
                    <div class="text-[8px] text-slate-500">06-12</div>
                </button>
                <button id="opt-t-afternoon" onclick="handleOptionClick('today', 'afternoon', this)" class="option-btn rounded-xl p-2 text-center group">
                    <div class="status-tag"></div>
                    <div class="text-[10px] font-bold text-emerald-400 group-hover:scale-110 transition-transform">晏就</div>
                    <div class="text-[8px] text-slate-500">12-18</div>
                </button>
                <button id="opt-t-night" onclick="handleOptionClick('today', 'night', this)" class="option-btn rounded-xl p-2 text-center group">
                    <div class="status-tag"></div>
                    <div class="text-[10px] font-bold text-emerald-400 group-hover:scale-110 transition-transform">夜晚</div>
                    <div class="text-[8px] text-slate-500">18-04</div>
                </button>
                <button id="opt-t-deep" onclick="handleOptionClick('today', 'deep_pre', this)" class="option-btn rounded-xl p-2 text-center group">
                    <div class="status-tag"></div>
                    <div class="text-[10px] font-bold text-emerald-400 group-hover:scale-110 transition-transform">2400前</div>
                    <div class="text-[8px] text-slate-500">深夜</div>
                </button>
            </div>
        </div>

        <!-- 底部：飛機時空軸 -->
        <div class="relative px-4 h-20 flex items-center">
            <div class="w-full timeline-container shadow-[0_0_10px_rgba(51,65,85,0.3)]">
                <div id="plane-wrapper" class="plane-wrapper">
                    <div id="plane" class="plane-icon transition-transform duration-300">✈️</div>
                </div>
                <div id="hk-marker" class="hk-now-marker"></div>
            </div>
            <input type="range" id="main-timeline" min="-20" max="6" step="0.1" value="0" oninput="handleSliderChange()">
            
            <div class="absolute -bottom-2 left-4 text-[8px] text-slate-600 font-bold tracking-tighter">PAST (-20H)</div>
            <div class="absolute -bottom-2 right-4 text-[8px] text-slate-600 font-bold tracking-tighter">FUTURE (+6H)</div>
        </div>
    </div>

    <script>
        const timezoneData = [
            { offset: -12, location: "Baker Island" }, { offset: -11, location: "Pago Pago" }, { offset: -10, location: "Honolulu" },
            { offset: -9, location: "Anchorage" }, { offset: -8, location: "Los Angeles" }, { offset: -7, location: "Denver" },
            { offset: -6, location: "Chicago" }, { offset: -5, location: "New York" }, { offset: -4, location: "Santiago" },
            { offset: -3, location: "Buenos Aires" }, { offset: -2, location: "South Georgia" }, { offset: -1, location: "Azores" },
            { offset: 0, location: "London" }, { offset: 1, location: "Paris" }, { offset: 2, location: "Cairo" },
            { offset: 3, location: "Moscow" }, { offset: 4, location: "Dubai" }, { offset: 5, location: "Karachi" },
            { offset: 6, location: "Dhaka" }, { offset: 7, location: "Bangkok" }, { offset: 8, location: "Hong Kong" },
            { offset: 9, location: "Tokyo" }, { offset: 10, location: "Sydney" }, { offset: 11, location: "Noumea" },
            { offset: 12, location: "Auckland" }, { offset: 13, location: "Nuku'alofa" }, { offset: 14, location: "Kiritimati" }
        ];

        const clickStore = {};
        const timeConfigs = {
            'morning': { h: 9, m: 0, start: 6, end: 12 },
            'afternoon': { h: 14, m: 0, start: 12, end: 18 },
            'night': { h: 22, m: 0, start: 18, end: 29 }, // 29 即翌日凌晨 5 點 (18+11)
            'deep_pre': { h: 23, m: 0, start: 23, end: 24 } // 鎖定在 23:00 - 24:00
        };

        // 核心：熬夜者邏輯
        function getLogicalDate() {
            const now = new Date();
            const logicDate = new Date(now);
            // 只要未到凌晨 5 點，逻辑上就還是在過物理上的「昨天」
            if (now.getHours() < 5) {
                logicDate.setDate(now.getDate() - 1);
            }
            return logicDate;
        }

        function getTargetTime(dayTab, type) {
            const now = new Date();
            const logicNow = getLogicalDate();
            
            // 獲取邏輯今天香港時間的 00:00
            const baseDate = new Date(logicNow.toLocaleDateString('en-CA', {timeZone: 'Asia/Hong_Kong'}) + "T00:00:00+08:00");
            const target = new Date(baseDate);
            const config = timeConfigs[type];

            if (dayTab === 'yesterday') {
                target.setDate(target.getDate() - 1);
            }

            target.setHours(config.h, config.m, 0, 0);
            return target;
        }

        function handleOptionClick(day, type, btn) {
            const btnId = btn.id;
            if (!clickStore[btnId]) clickStore[btnId] = 0;
            if (btn.dataset.locked === "true") return;

            const now = new Date();
            let target = getTargetTime(day, type);
            let diffHours = (target - now) / 3600000;
            const currentHour = now.getHours();
            const config = timeConfigs[type];

            // 智能尋找最近可用時間演算法 (Smart Jump Logic)
            // 如果原本的 target (e.g. 09:00) 已經超出 Slider 限制 (-20H ~ +6H)
            if (diffHours < -20 || diffHours > 6) {
                let bestDiff = diffHours;
                let bestTarget = target;
                let minViolation = Infinity;

                // 生成該時段內所有需要檢查的小時
                let hoursToCheck = [];
                if (config.start < config.end) {
                    for (let i = config.start; i <= config.end; i++) hoursToCheck.push(i);
                } else {
                    for (let i = config.start; i <= 23; i++) hoursToCheck.push(i);
                    for (let i = 0; i <= config.end; i++) hoursToCheck.push(i + 24);
                }

                // 尋找距離滑軌限制內、且最接近原定目標的可用時間
                for (let h of hoursToCheck) {
                    const testTarget = new Date(target);
                    let testH = h;
                    if (testH >= 24) {
                        testTarget.setDate(testTarget.getDate() + 1);
                        testH -= 24;
                    }
                    testTarget.setHours(testH, 0, 0, 0);
                    const testDiff = (testTarget - now) / 3600000;
                    
                    if (testDiff >= -20 && testDiff <= 6) {
                        let prefH = config.h;
                        if (config.start > config.end && prefH <= config.end) prefH += 24;
                        
                        const violation = Math.abs(h - prefH);
                        if (violation < minViolation) {
                            minViolation = violation;
                            bestDiff = testDiff;
                            bestTarget = testTarget;
                        }
                    }
                }

                // 若找到符合的最近可用時間，替換目標
                if (minViolation !== Infinity) {
                    target = bestTarget;
                    diffHours = bestDiff;
                }
            }
            
            // 當下區間判定
            let isCurrentSlot = false;
            if (day === 'today') {
                let logicalCurrentHour = currentHour;
                if (logicalCurrentHour < 5) logicalCurrentHour += 24; // 配合跨天陣列 mapping
                isCurrentSlot = logicalCurrentHour >= config.start && logicalCurrentHour < config.end;
            }
            
            const isTooOld = diffHours < -20.01; 
            const isFuture = diffHours > 6.01;   
            const isNow = isCurrentSlot; 

            clickStore[btnId]++;

            if (isTooOld || isFuture || isNow) {
                // 第 4 下出字 (前 3 下震動紅框)
                if (clickStore[btnId] <= 3) {
                    btn.classList.add('animate-shake');
                    setTimeout(() => btn.classList.remove('animate-shake'), 300);
                    if (isNow) executeJump(now); // 點擊當下，彈回正紅色Marker
                    return;
                } else {
                    btn.dataset.locked = "true";
                    // 移除灰階 class，加入 dead-btn，令文字與 emoji 清晰可見
                    btn.classList.remove('expired-btn');
                    btn.classList.add('dead-btn');
                    let msg = isNow ? "珍惜當下 ✨" : (isTooOld ? "光陰一去不返 🥀" : "未來可期 🚀");
                    btn.innerHTML = `<div class="text-[11px] font-bold text-slate-300 uppercase tracking-tighter leading-tight text-center">${msg}</div>`;
                    return;
                }
            }

            executeJump(target);
        }

        function executeJump(target) {
            const now = new Date();
            const diffHours = (target - now) / 3600000;
            const clampedDiff = Math.max(-20, Math.min(6, diffHours));
            document.getElementById('main-timeline').value = clampedDiff;
            updateUI(target, clampedDiff);
        }

        function handleSliderChange() {
            const relativeOffset = parseFloat(document.getElementById('main-timeline').value);
            const now = new Date();
            const targetDate = new Date(now.getTime() + relativeOffset * 3600000);
            updateUI(targetDate, relativeOffset);
        }

        function updateUI(targetDate, relativeOffset) {
            document.getElementById('display-time').innerText = targetDate.toLocaleTimeString('zh-HK', { hour12: false, hour: '2-digit', minute: '2-digit' });
            document.getElementById('display-date').innerText = targetDate.toLocaleDateString('zh-HK', { month: 'short', day: 'numeric', year: 'numeric' });

            const percent = ((relativeOffset + 20) / 26) * 100;
            document.getElementById('plane-wrapper').style.left = `${percent}%`;
            document.getElementById('plane').style.transform = `rotate(${relativeOffset >= 0 ? '0deg' : '180deg'})`;

            const targetTimezone = 8 + relativeOffset;
            document.getElementById('info-offset').innerText = `UTC ${targetTimezone >= 0 ? '+' : ''}${targetTimezone.toFixed(1)}`;
            const closest = timezoneData.reduce((prev, curr) => Math.abs(curr.offset - targetTimezone) < Math.abs(prev.offset - targetTimezone) ? curr : prev);
            document.getElementById('info-city').innerText = closest.location;
        }

        function updateButtonsStatus() {
            const now = new Date();
            const currentHour = now.getHours();
            const buttons = [
                {d:'yesterday', t:'morning', id:'opt-y-morning'}, {d:'yesterday', t:'afternoon', id:'opt-y-afternoon'}, {d:'yesterday', t:'night', id:'opt-y-night'}, {d:'yesterday', t:'deep_pre', id:'opt-y-deep'},
                {d:'today', t:'morning', id:'opt-t-morning'}, {d:'today', t:'afternoon', id:'opt-t-afternoon'}, {d:'today', t:'night', id:'opt-t-night'}, {d:'today', t:'deep_pre', id:'opt-t-deep'}
            ];

            buttons.forEach(opt => {
                const btn = document.getElementById(opt.id);
                if (!btn) return;
                const tag = btn.querySelector('.status-tag');
                if (btn.dataset.locked === "true") return;

                const target = getTargetTime(opt.d, opt.t);
                const diffHours = (target - now) / 3600000;
                const config = timeConfigs[opt.t];

                let isCurrentSlot = false;
                if (opt.d === 'today') {
                    let logicalCurrentHour = currentHour;
                    if (logicalCurrentHour < 5) logicalCurrentHour += 24;
                    isCurrentSlot = logicalCurrentHour >= config.start && logicalCurrentHour < config.end;
                }
                
                if (isCurrentSlot) {
                    btn.classList.add('expired-btn');
                    tag.innerText = "當下";
                    tag.className = "status-tag text-emerald-500";
                } else if (diffHours < -20.01) {
                    btn.classList.add('expired-btn');
                    tag.innerText = "OVER";
                    tag.className = "status-tag text-red-500";
                } else if (diffHours > 6.01) {
                    btn.classList.add('expired-btn');
                    tag.innerText = "未到";
                    tag.className = "status-tag text-sky-500";
                } else {
                    btn.classList.remove('expired-btn');
                    tag.innerText = "";
                }
            });
        }

        function switchTab(tab) {
            document.getElementById('options-yesterday').classList.toggle('hidden', tab !== 'yesterday');
            document.getElementById('options-today').classList.toggle('hidden', tab !== 'today');
            document.getElementById('tab-yesterday-btn').classList.toggle('tab-active', tab === 'yesterday');
            document.getElementById('tab-today-btn').classList.toggle('tab-active', tab === 'today');
        }

        window.onload = () => {
            const percent = (20 / 26) * 100;
            document.getElementById('hk-marker').style.left = `${percent}%`;
            document.getElementById('main-timeline').value = 0;
            handleSliderChange();
            updateButtonsStatus();
            setInterval(updateButtonsStatus, 10000); 
        };
    </script>
</body>
</html>
